<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cover Art Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 560px;
    }

    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1db954; }
    input::placeholder { color: #555; }

    button {
      padding: 0.75rem 1.4rem;
      border-radius: 8px;
      border: none;
      background: #1db954;
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #1ed760; }
    button:disabled { background: #145c2e; color: #333; cursor: not-allowed; }

    .error {
      margin-top: 1rem;
      color: #f44;
      font-size: 0.9rem;
    }

    .result {
      margin-top: 2.5rem;
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    .track-info {
      margin-bottom: 1.5rem;
    }

    .track-name {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .track-artist {
      color: #aaa;
      font-size: 0.95rem;
      margin-top: 0.2rem;
    }

    .images-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .image-card {
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem;
    }

    .image-card img {
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .image-info {
      flex: 1;
      text-align: left;
    }

    .image-size {
      font-weight: 600;
      font-size: 1rem;
    }

    .image-dims {
      color: #888;
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }

    .download-btn {
      margin-top: 0.8rem;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #333;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .download-btn:hover { background: #333; }
  </style>
</head>
<body>
  <h1>Cover Art Extractor</h1>
  <p class="subtitle">Paste a Spotify track or album link</p>

  <div class="input-row">
    <input id="urlInput" type="text" placeholder="https://open.spotify.com/track/..." />
    <button id="fetchBtn" onclick="fetchCover()">Get Cover</button>
  </div>

  <div id="error" class="error" style="display:none"></div>
  <div id="result" class="result" style="display:none"></div>

  <script>
    const input = document.getElementById('urlInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchCover(); });

    async function fetchCover() {
      const url = input.value.trim();
      if (!url) return;

      const btn = document.getElementById('fetchBtn');
      const errorDiv = document.getElementById('error');
      const resultDiv = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = 'Fetching...';
      errorDiv.style.display = 'none';
      resultDiv.style.display = 'none';

      try {
        const res = await fetch('/api/cover?url=' + encodeURIComponent(url));
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Unknown error');
        }

        const sizeLabels = { 640: 'Large', 300: 'Medium', 64: 'Small' };

        const cards = data.images.map(img => {
          const label = sizeLabels[img.width] || `${img.width}px`;
          const thumb = Math.min(img.width, 80);
          return `
            <div class="image-card">
              <img src="${img.url}" width="${thumb}" height="${thumb}" alt="cover" />
              <div class="image-info">
                <div class="image-size">${label}</div>
                <div class="image-dims">${img.width} × ${img.height}px</div>
                <a class="download-btn" href="${img.url}" download target="_blank">Download</a>
              </div>
            </div>
          `;
        }).join('');

        resultDiv.innerHTML = `
          <div class="track-info">
            <div class="track-name">${escapeHtml(data.name)}</div>
            <div class="track-artist">${escapeHtml(data.artist)}</div>
          </div>
          <div class="images-grid">${cards}</div>
        `;
        resultDiv.style.display = 'block';

      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Cover';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
